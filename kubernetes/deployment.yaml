apiVersion: apps/v1
kind: Deployment
metadata:
  name: flutter-web-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flutter-web
  template:
    metadata:
      labels:
        app: flutter-web
    spec:
      containers:
      - name: flutter-web-container
        image: your-dockerhub-username/flutter-web:latest
        ports:
        - containerPort: 80